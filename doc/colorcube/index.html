<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Color Cube Intersection</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Color Cube Intersection</h1>
  <canvas id="cubeCanvas"></canvas>
  <div>
    <label for="zSlider">Intersection Plane Height (Z): </label>
    <input type="range" id="zSlider" min="0" max="1" step="0.01" value="0.5">
    <span id="zValue">0.5</span>
  </div>
  <script src="main.js"></script>
</body>
</html>
